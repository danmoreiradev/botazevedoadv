<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Azevedo & Juvencio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: #094360; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 450px; /* Card levemente mais largo para acomodar o logo maior */
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .logo-container {
            width: 100%;
            margin-bottom: 10px; /* Reduzi a margem pois o logo já ocupa bastante espaço */
            display: flex;
            justify-content: center;
        }

        .logo-adv {
            /* Aumentado para 280px para dar destaque e clareza */
            width: 280px; 
            height: auto;
            
            /* Hacks de nitidez para imagens de alta resolução redimensionadas */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: high-quality;
            
            /* Garante que a proporção 1:1 seja respeitada */
            object-fit: contain;
        }

        .btn-adv { 
            background: #c5a059; 
            color: white; 
            border: none; 
            font-weight: bold; 
            padding: 14px;
            border-radius: 8px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-adv:hover {
            background: #a8874a;
            color: white;
            box-shadow: 0 4px 12px rgba(197, 160, 89, 0.3);
        }

        .form-control {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ced4da;
        }

        .form-control:focus {
            border-color: #c5a059;
            box-shadow: 0 0 0 0.25rem rgba(197, 160, 89, 0.2);
        }

        .footer-text {
            margin-top: 20px;
            color: #6c757d;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="https://azevedoejuvencioadvogados.com.br/wp-content/uploads/2026/01/Logo-Alta-Resolucao-copy@azul-SEM-SOMBRA-1024x1024.png" 
                 alt="Azevedo & Juvencio" 
                 class="logo-adv">
        </div>

        <h5 class="mb-4" style="color:#094360; font-weight: 700; letter-spacing: 1px;">PAINEL JURÍDICO</h5>
        
        <form action="/login" method="POST">
            <div class="mb-3">
                <input type="text" name="user" class="form-control" placeholder="Usuário" required>
            </div>
            <div class="mb-3">
                <input type="password" name="pass" class="form-control" placeholder="Senha" required>
            </div>
            <button type="submit" class="btn btn-adv w-100">Entrar no Sistema</button>
        </form>

        <div class="footer-text">
            <strong>Azevedo & Juvencio Advogados</strong><br>
            Acesso Restrito
        </div>
    </div>

</body>
</html>

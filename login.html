<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | Azevedo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #094360; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        .btn-adv { background: #c5a059; color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="mb-4" style="color:#094360">⚖️ Painel Jurídico</h2>
        <form action="/login" method="POST">
            <input type="text" name="user" class="form-control mb-3" placeholder="Usuário" required>
            <input type="password" name="pass" class="form-control mb-3" placeholder="Senha" required>
            <button class="btn btn-adv w-100">ENTRAR NO SISTEMA</button>
        </form>
        <p class="mt-4 text-muted small">Restrito a Azevedo & Juvencio</p>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Azevedo & Juvencio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root { 
            --adv-blue: #094360; 
            --adv-gold: #c5a059;
            --whatsapp-green: #25d366;
            --danger-red: #ea4335;
            --bg-light: #f4f7f6;
        }
        
        body { 
            background-color: var(--bg-light); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        
        /* SIDEBAR DESKTOP - LARGURA AUMENTADA PARA LOGO GRANDE */
        .sidebar { 
            width: 320px; 
            background: var(--adv-blue); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 4px 0 15px rgba(0,0,0,0.1); 
            z-index: 1001;
        }
        
        .sidebar-brand { 
            padding: 45px 15px; /* Espaçamento interno generoso */
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            text-align: center; 
            background: rgba(0,0,0,0.1);
        }

        /* AJUSTE DO LOGO - VISIBILIDADE MÁXIMA */
        .logo-img {
            width: 95%; /* Ocupa quase toda a largura da sidebar */
            height: auto;
            max-height: 140px; /* Aumentado drasticamente para visibilidade total */
            object-fit: contain;
            /* Sombra para destacar letras brancas no fundo azul */
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.4)); 
            transition: transform 0.3s ease;
        }
        
        .logo-img:hover {
            transform: scale(1.02); /* Leve efeito ao passar o mouse */
        }
        
        .nav-link { 
            color: rgba(255,255,255,0.7); 
            padding: 22px 25px; 
            cursor: pointer; 
            border-left: 6px solid transparent; 
            transition: 0.3s; 
            text-decoration: none; 
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .nav-link:hover, .nav-link.active { 
            color: white; 
            background: rgba(255,255,255,0.07); 
            border-left-color: var(--adv-gold); 
        }

        .main-content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 40px; 
            display: flex;
            flex-direction: column;
        }
        
        .card-custom { 
            background: white; 
            padding: 35px; 
            border-radius: 25px; 
            box-shadow: 0 12px 35px rgba(0,0,0,0.06); 
            text-align: center;
            border: none;
        }
        
        /* WHATSAPP ELEMENTS */
        #qrcode { 
            display: flex; 
            justify-content: center; 
            margin: 25px 0; 
            padding: 15px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        
        #profilePic { 
            width: 140px; 
            height: 140px; 
            border-radius: 50%; 
            border: 6px solid var(--whatsapp-green); 
            object-fit: cover; 
            margin-bottom: 20px; 
        }
        
        .status-badge { 
            display: inline-block; 
            padding: 10px 25px; 
            border-radius: 50px; 
            font-size: 0.8rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-bottom: 20px; 
        }
        
        .bg-waiting { background: #fff3e0; color: #ef6c00; }
        .bg-online { background: #e8f9ef; color: #1ea952; }
        
        .btn-logout-wa { 
            background-color: var(--danger-red); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: 700; 
            width: 100%; 
            max-width: 300px;
        }

        /* Estilo para o campo de busca */
        .search-container {
            position: relative;
            margin-bottom: 20px;
        }
        .search-input {
            padding-left: 40px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }
        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        /* Estilo para o item da lista com lixeira */
        .knowledge-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: background 0.2s;
        }
        .knowledge-item:hover {
            background: #f8f9fa;
        }
        .btn-delete {
            color: var(--danger-red);
            background: none;
            border: none;
            padding: 5px 10px;
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }
        .btn-delete:hover {
            opacity: 1;
            transform: scale(1.1);
    }
            
        .hidden { display: none !important; }

        /* RESPONSIVIDADE MOBILE APRIMORADA */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; position: sticky; top: 0; }
            .sidebar-brand { padding: 25px 15px; }
            .logo-img { max-height: 90px; width: 90%; }
            .nav { flex-direction: row !important; }
            .nav-link { 
                flex: 1; 
                justify-content: center; 
                padding: 18px 5px; 
                font-size: 0.75rem; 
                border-left: none; 
                border-bottom: 5px solid transparent; 
            }
            .nav-link.active { border-bottom: 5px solid var(--adv-gold); }
            .main-content { padding: 25px 15px; }
            .mt-auto { margin-top: 0 !important; background: rgba(0,0,0,0.2) !important; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">
            <img src="https://azevedoejuvencioadvogados.com.br/wp-content/uploads/2026/01/Copia-de-Logo-Alta-Resolucao-horizontal-transparencia-1024x335.png" alt="Azevedo e Juvencio" class="logo-img">
        </div>
        
        <div class="nav flex-column mt-md-2">
            <div class="nav-link active" onclick="switchTab('tab-chatbot', this)">🤖 Chatbot - Conexão</div>
            <div class="nav-link" onclick="switchTab('tab-ia', this)">🧠 Gestão IA</div>
        </div>

        <div class="mt-auto nav-link border-0 text-white-50" onclick="window.location.href='/logout-panel'" style="font-size: 0.85rem; background: rgba(0,0,0,0.2); cursor: pointer;">
    🚪      Sair
        </div>
    </div>

    <div class="main-content">
        <div id="tab-chatbot" class="content-section">
            <h4 class="mb-4" style="color: var(--adv-blue); font-weight: 700;">Conectividade WhatsApp</h4>
            
            <div class="card-custom mx-auto" style="max-width: 480px; min-height: 450px; display: flex; flex-direction: column; justify-content: center;">
                <div id="qr-container">
                    <div class="status-badge bg-waiting">Aguardando Conexão</div>
                    <p id="qr-status" class="text-muted mb-4">Escaneie o QR Code com seu WhatsApp:</p>
                    <div id="qrcode"></div>
                </div>

                <div id="status-container" class="hidden">
                    <div class="status-badge bg-online">Sessão Ativa</div><br>
                    <img id="profilePic" src="" alt="Perfil">
                    <div class="user-info">
                        <h3 id="userName" style="color: #222; font-size: 1.5rem; margin-top: 10px;"></h3>
                        <p id="userNumber" style="color: #666; margin-bottom: 25px;"></p>
                    </div>
                    <button class="btn-logout-wa" onclick="handleWhatsAppLogout()">Desconectar Aparelho</button>
                </div>
            </div>
        </div>

        <div id="tab-ia" class="content-section hidden">
            <h4 class="mb-4" style="color: var(--adv-blue); font-weight: 700;">Base de Conhecimento IA</h4>
            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="card-custom text-start p-4">
                        <h5 class="mb-4" style="color: var(--adv-blue)">Treinar Robô</h5>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Palavra ou Frase Gatilho</label>
                            <input type="text" id="pergunta_ia" class="form-control" placeholder="Ex: Valor da consulta">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Resposta Automática</label>
                            <textarea id="resposta_ia" class="form-control" rows="6" placeholder="Escreva a resposta completa aqui..."></textarea>
                        </div>
                        <button class="btn w-100 text-white fw-bold py-3" style="background: var(--adv-blue)" onclick="salvarConhecimento()">ATUALIZAR CÉREBRO IA</button>
                    </div>
                </div>

                <div class="col-lg-7">
                    <div class="card-custom text-start p-4" style="min-height: 480px;">
                        <h5 class="mb-4" style="color: var(--adv-blue)">Conhecimentos Ativos</h5>
                        
                        <div class="search-container">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="input_busca" class="form-control search-input" placeholder="Pesquisar conhecimento..." onkeyup="filtrarConhecimento()">
                        </div>

                        <div id="lista_conhecimento" class="list-group list-group-flush overflow-auto" style="max-height: 400px;">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    
    <script>
        const socket = io();

        function switchTab(tabId, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.remove('hidden');
            el.classList.add('active');
            if(tabId === 'tab-ia') carregarConhecimento();
        }

        socket.on('qr', (qr) => {
            document.getElementById('status-container').classList.add('hidden');
            document.getElementById('qr-container').classList.remove('hidden');
            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = "";
            new QRCode(qrcodeDiv, { text: qr, width: 240, height: 240, colorDark: "#094360" });
        });

        socket.on('connected', (user) => {
        document.getElementById('qr-container').classList.add('hidden');
        document.getElementById('status-container').classList.remove('hidden');
        
        const imgElement = document.getElementById('profilePic');
        // Se não vier foto do zap, esconde o elemento de imagem ou usa uma borda vazia
        if (user.pic) {
            imgElement.src = user.pic;
            imgElement.style.display = "inline-block";
        } else {
            imgElement.style.display = "none"; // Remove o avatar se não houver foto
        }
        
        document.getElementById('userName').innerText = user.name || 'Conectado';
        document.getElementById('userNumber').innerText = user.number || '';
        });

        socket.on('disconnected', () => {
            window.location.reload();
        });

        async function salvarConhecimento() {
            const pergunta = document.getElementById('pergunta_ia').value;
            const resposta = document.getElementById('resposta_ia').value;
            if(!pergunta || !resposta) return alert("Preencha todos os campos.");

            const res = await fetch('/api/knowledgeColl', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pergunta, resposta })
            });

            if(res.ok) {
                document.getElementById('pergunta_ia').value = "";
                document.getElementById('resposta_ia').value = "";
                carregarConhecimento();
            }
        }

        // Função para carregar e exibir a lista com botão de lixo
async function carregarConhecimento() {
    const res = await fetch('/api/knowledgeColl');
    const data = await res.json();
    const container = document.getElementById('lista_conhecimento');
    
    // Guardamos os dados globalmente para a busca funcionar sem nova requisição
    window.todosConhecimentos = data; 

    renderizarLista(data);
}

// Função auxiliar para desenhar a lista na tela
function renderizarLista(itens) {
    const container = document.getElementById('lista_conhecimento');
    if(!itens.length) {
        container.innerHTML = `<p class="text-muted p-3">Nenhum resultado encontrado.</p>`;
        return;
    }

    container.innerHTML = itens.map(item => `
        <div class="list-group-item py-3 border-bottom knowledge-item">
            <div style="flex: 1;">
                <div class="fw-bold mb-1" style="color: var(--adv-blue);">${item.pergunta}</div>
                <div class="text-muted small">${item.resposta}</div>
            </div>
            <button class="btn-delete" onclick="removerConhecimento('${item._id}')" title="Excluir">
                🗑️
            </button>
        </div>
    `).join('');
}

        function filtrarConhecimento() {
            const termo = document.getElementById('input_busca').value.toLowerCase();
            const filtrados = window.todosConhecimentos.filter(item => 
                item.pergunta.toLowerCase().includes(termo) || 
                item.resposta.toLowerCase().includes(termo)
            );
            renderizarLista(filtrados);
        }
        async function removerConhecimento(id) {
            if(!confirm("Tem certeza que deseja remover este conhecimento?")) return;

            try {
                const res = await fetch(`/api/knowledgeColl/${id}`, { method: 'DELETE' });
                if(res.ok) {
                    carregarConhecimento(); // Recarrega a lista
                } else {
                    alert("Erro ao remover o item.");
                }
            } catch (err) {
                console.error("Erro:", err);
            }
        }

        function handleWhatsAppLogout() {
            if(confirm("Deseja realmente desconectar?")) {
                fetch('/logout-whatsapp');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Bot Azevedo</title>
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --whatsapp-green: #25d366; --danger-red: #ea4335; --bg-color: #f0f2f5; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 350px; min-height: 450px; display: flex; flex-direction: column; justify-content: center; }
        
        h2 { color: #333; margin-bottom: 20px; font-weight: 600; }
        
        #qrcode { display: flex; justify-content: center; margin: 20px 0; padding: 10px; background: white; border-radius: 10px; }
        
        .profile-container { display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #profilePic { width: 130px; height: 130px; border-radius: 50%; border: 5px solid var(--whatsapp-green); object-fit: cover; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .user-info h3 { margin: 5px 0; color: #222; font-size: 1.4rem; }
        .user-info p { margin: 0; color: #666; font-size: 1rem; margin-bottom: 25px; }
        
        .status-badge { display: inline-block; background: #e8f9ef; color: #1ea952; padding: 6px 15px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }

        .btn-logout { background-color: var(--danger-red); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: all 0.3s ease; width: 100%; }
        .btn-logout:hover { background-color: #d33426; transform: scale(1.02); }

        .hidden { display: none !important; }
        #qr-status { color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>WhatsApp Manager</h2>
        
        <div id="qr-container">
            <div class="status-badge" style="background: #fff3e0; color: #ef6c00;">Aguardando Conexão</div>
            <p id="qr-status">Iniciando servidor...</p>
            <div id="qrcode"></div>
        </div>

        <div id="status-container" class="hidden">
            <div class="profile-container">
                <div class="status-badge">Conectado</div>
                <img id="profilePic" src="" alt="Foto">
                <div class="user-info">
                    <h3 id="userName"></h3>
                    <p id="userNumber"></p>
                </div>
                <button class="btn-logout" onclick="handleLogout()">Desconectar Aparelho</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const qrContainer = document.getElementById('qr-container');
        const statusContainer = document.getElementById('status-container');
        const qrDiv = document.getElementById('qrcode');
        const qrStatus = document.getElementById('qr-status');

        function handleLogout() {
            if(confirm("Deseja realmente desconectar este aparelho?")) {
                fetch('/logout').then(res => {
                    if(res.ok) {
                        // O socket.on('disconnected') cuidará do resto
                        console.log("Solicitado logout...");
                    }
                });
            }
        }

        socket.on('qr', (qr) => {
            statusContainer.classList.add('hidden');
            qrContainer.classList.remove('hidden');
            qrStatus.innerText = "Escaneie para conectar:";
            qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: qr, width: 200, height: 200, colorDark: "#333333" });
        });

        socket.on('connected', (user) => {
            qrContainer.classList.add('hidden');
            statusContainer.classList.remove('hidden');
            document.getElementById('profilePic').src = user.pic;
            document.getElementById('userName').innerText = user.name;
            document.getElementById('userNumber').innerText = user.number;
        });

        socket.on('disconnected', () => {
            // Reset visual total para esperar novo QR
            statusContainer.classList.add('hidden');
            qrContainer.classList.remove('hidden');
            qrDiv.innerHTML = "";
            qrStatus.innerText = "Sessão encerrada. Gerando novo QR...";
            setTimeout(() => window.location.reload(), 1500); // Reload suave para limpar o estado do bot
        });
    </script>
</body>
</html>
